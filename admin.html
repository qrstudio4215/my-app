<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 🔥 PWA App Meta Tags 🔥 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3b82f6">
    <title>QR Studio</title>
    
    <!-- QR Library & Icons & Scanner -->
    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.4.13/dist/easy.qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script> <!-- Scanner Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-body: #eef2f6; --app-bg: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b;
            --primary: #3b82f6; --primary-gradient: linear-gradient(135deg, #3b82f6, #6366f1);
            --input-bg: #f1f5f9; --border: #e2e8f0;
            --nav-bg: rgba(255, 255, 255, 0.85); --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        body.dark-mode {
            --bg-body: #0f172a; --app-bg: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --input-bg: #0f172a; --border: #334155;
            --nav-bg: rgba(30, 41, 59, 0.85); --shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Inter', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-body); display: flex; justify-content: center; 
            align-items: center; overflow: hidden; overscroll-behavior-y: none;
        }

        .app-container {
            width: 100%; max-width: 420px; height: 100%; max-height: 100dvh;
            background: var(--app-bg); display: flex; flex-direction: column;
            position: relative; transition: 0.3s;
        }

        @media (min-width: 450px) { 
            .app-container { height: 95vh; border-radius: 30px; box-shadow: var(--shadow); border: 8px solid var(--bg-body); } 
        }

        .header {
            padding: 20px 25px; display: flex; justify-content: space-between; align-items: center;
            background: var(--nav-bg); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 10;
        }
        .header h2 { margin: 0; font-size: 20px; color: var(--text-main); font-weight: 700; display: flex; align-items: center; gap: 8px; }
        
        .head-actions { display: flex; gap: 10px; }
        .theme-btn {
            background: var(--input-bg); border: none; width: 42px; height: 42px;
            border-radius: 50%; color: var(--text-main); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s;
        }
        .lang-btn { font-weight: 900; font-size: 13px; color: var(--primary); }

        .main-content {
            flex: 1; overflow-y: auto; padding: 25px; padding-bottom: 100px; scroll-behavior: smooth;
        }
        .main-content::-webkit-scrollbar { display: none; }

        .qr-card {
            background: var(--app-bg); padding: 20px; border-radius: 24px; display: flex; 
            flex-direction: column; align-items: center; margin-bottom: 25px; border: 1px solid var(--border);
        }

        #qr-container {
            width: 200px; height: 200px; background: white; border-radius: 16px; display: flex; 
            justify-content: center; align-items: center; box-shadow: 0 8px 25px rgba(0,0,0,0.08); padding: 12px; margin-bottom: 20px;
        }

        .action-btns { display: flex; gap: 10px; width: 100%; }
        .action-btns button {
            flex: 1; padding: 12px 5px; border: none; border-radius: 12px; font-size: 13px;
            font-weight: 700; cursor: pointer; color: white; display: flex; flex-direction: column; 
            gap: 5px; align-items: center; transition: 0.2s;
        }
        .action-btns button:active { transform: scale(0.95); }
        .btn-copy { background: #64748b; }
        .btn-share { background: #10b981; }
        .btn-down { background: var(--primary-gradient); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-open { background: #f59e0b; }

        .view-section { display: none; animation: slideUp 0.4s ease; }
        .view-section.active { display: block; }
        
        label { display: block; margin: 0 0 8px 5px; font-size: 13px; font-weight: 600; color: var(--text-muted); }
        .input-wrap { margin-bottom: 18px; }
        input, select, textarea {
            width: 100%; padding: 14px; background: var(--input-bg); border: 2px solid transparent;
            color: var(--text-main); border-radius: 14px; outline: none; font-size: 14px; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); background: transparent; }
        textarea { height: 80px; resize: none; }
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input[type="color"] { height: 45px; padding: 2px; cursor: pointer; }
        
        .switch-wrap { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text-main); font-weight: 600; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--primary); }

        /* Scanner Styles */
        #reader { width: 100%; border-radius: 16px; overflow: hidden; border: 2px solid var(--border); background: #000; }
        #reader video { object-fit: cover; border-radius: 16px; }

        .bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%; background: var(--nav-bg); 
            backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: flex; 
            overflow-x: auto; padding: 10px; z-index: 20; scroll-snap-type: x mandatory;
        }
        .bottom-nav::-webkit-scrollbar { display: none; }
        .nav-item {
            background: none; border: none; color: var(--text-muted); padding: 8px 15px; min-width: 75px;
            display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; 
            font-size: 11px; font-weight: 600; transition: 0.3s; scroll-snap-align: center;
        }
        .nav-item i { font-size: 20px; }
        .nav-item.active { color: var(--primary); }

        .history-item { 
            background: var(--input-bg); padding: 12px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid var(--border);
        }
        .history-text { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 70%; color: var(--text-main); font-size: 14px; font-weight: 600; }
        .history-type { font-size: 11px; color: var(--primary); background: rgba(59, 130, 246, 0.1); padding: 3px 8px; border-radius: 8px; }

        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) scale(0.9);
            background: var(--text-main); color: var(--bg-body); padding: 12px 25px; border-radius: 30px; 
            font-size: 14px; font-weight: 600; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 100;
        }
        #toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ✨ QR Generate Animation */
        @keyframes qrPop { 0% { transform: scale(0.7) rotate(-5deg); opacity: 0; } 70% { transform: scale(1.08) rotate(1deg); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .qr-animate { animation: qrPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* 🔍 QR Zoom Modal */
        #zoom-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px); z-index: 999; justify-content: center; align-items: center;
            animation: fadeIn 0.2s ease;
        }
        #zoom-modal.open { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #zoom-inner {
            background: white; border-radius: 24px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            animation: qrPop 0.3s ease;
        }
        #zoom-inner canvas, #zoom-inner img { border-radius: 12px; max-width: 280px; max-height: 280px; }
        #zoom-close {
            background: #f1f5f9; border: none; border-radius: 50px; padding: 10px 28px;
            font-size: 14px; font-weight: 700; cursor: pointer; color: #1e293b;
        }
        #zoom-modal .zoom-hint { font-size: 12px; color: #64748b; }
        #qr-container { cursor: zoom-in; transition: transform 0.2s; }
        #qr-container:active { transform: scale(0.96); }

        /* ⭐ Favorites */
        .history-item { position: relative; }
        .fav-btn {
            background: none; border: none; font-size: 18px; cursor: pointer;
            padding: 4px; transition: transform 0.2s; line-height: 1;
        }
        .fav-btn:active { transform: scale(1.4); }
        .history-item.is-fav { border-color: #f59e0b; background: rgba(245, 158, 11, 0.06); }
        .hist-actions { display: flex; align-items: center; gap: 6px; }
        .del-btn { background: none; border: none; font-size: 15px; cursor: pointer; color: #ef4444; padding: 4px; }
        .fav-section-title { font-size: 12px; font-weight: 700; color: #f59e0b; margin: 10px 0 6px 4px; }
        .all-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); margin: 10px 0 6px 4px; }

        /* 📷 Scan History */
        #view-scan .scan-hist-wrap { margin-top: 20px; }
        .scan-hist-title { font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
        .scan-hist-item {
            background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .scan-hist-text { font-size: 13px; color: var(--text-main); font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 65%; }
        .scan-hist-actions { display: flex; gap: 6px; }
        .scan-hist-actions button { background: none; border: none; font-size: 14px; cursor: pointer; padding: 4px; }

        /* 🌈 Design Power-ups */
        .frame-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .frame-chip {
            border: 2px solid var(--border); border-radius: 10px; padding: 8px 4px;
            background: var(--input-bg); cursor: pointer; display: flex; flex-direction: column;
            align-items: center; gap: 4px; font-size: 11px; font-weight: 700; color: var(--text-muted); transition: 0.2s;
        }
        .frame-chip.active, .frame-chip:hover { border-color: var(--primary); color: var(--primary); background: rgba(59,130,246,0.08); }
        .frame-chip i { font-size: 18px; }
        input[type="range"] { padding: 4px 0; cursor: pointer; accent-color: var(--primary); height: auto; }
        .size-display { text-align: right; font-size: 12px; font-weight: 700; color: var(--primary); }
        .gradient-row { display: flex; gap: 10px; align-items: center; }
        .gradient-toggle { flex-shrink: 0; }

        /* 🔍 Auto Detect Badge */
        .detect-badge {
            display: inline-flex; align-items: center; gap: 6px; background: rgba(59,130,246,0.1);
            color: var(--primary); border-radius: 20px; padding: 6px 12px; font-size: 12px;
            font-weight: 700; margin-bottom: 10px; animation: slideUp 0.3s ease;
        }

        /* 📊 QR Info Bar */
        #qr-info-bar {
            display: none; width: 100%; margin-top: 10px;
            background: var(--input-bg); border-radius: 10px; padding: 8px 12px;
            font-size: 11px; color: var(--text-muted); font-weight: 600;
            display: none; gap: 12px; justify-content: center; flex-wrap: wrap;
        }
        #qr-info-bar span { display: flex; align-items: center; gap: 4px; }
        #qr-info-bar.visible { display: flex; }
        /* 🎨 Skin Picker */
        .skin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .skin-card {
            border: 2px solid var(--border); border-radius: 12px; padding: 10px 5px;
            background: var(--input-bg); cursor: pointer; display: flex; flex-direction: column;
            align-items: center; gap: 5px; transition: 0.2s;
        }
        .skin-card:active { transform: scale(0.94); }
        .skin-card.active { border-color: var(--primary); background: rgba(59,130,246,0.1); }
        .skin-preview {
            width: 42px; height: 42px; border-radius: 8px;
            display: flex; justify-content: center; align-items: center; font-size: 9px;
            font-weight: 900; color: white; letter-spacing: 1px; overflow: hidden;
        }
        .skin-name { font-size: 10px; font-weight: 700; color: var(--text-muted); text-align: center; }
        .skin-card.active .skin-name { color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2><i class="fa-solid fa-qrcode" style="color: var(--primary)"></i> <span data-i18n="title">QR Studio</span></h2>
        <div class="head-actions">
            <button class="theme-btn lang-btn" onclick="toggleLang()" id="lang-btn">EN</button>
            <button class="theme-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="theme-icon"></i></button>
        </div>
    </div>

    <div class="main-content">
        
        <div class="qr-card" id="qr-card">
            <div id="qr-container" onclick="openZoom()" title="Tap to Zoom">
                <i class="fa-solid fa-qrcode" style="font-size: 70px; color: #cbd5e1;"></i>
            </div>
            <div class="action-btns" id="action-btns" style="display: none;">
                <button class="btn-copy" onclick="copyQR()"><i class="fa-solid fa-copy"></i> <span data-i18n="btn_copy">কপি</span></button>
                <button class="btn-share" onclick="shareQR()"><i class="fa-solid fa-share-nodes"></i> <span data-i18n="btn_share">শেয়ার</span></button>
                <button class="btn-down" onclick="downloadQR()"><i class="fa-solid fa-download"></i> <span data-i18n="btn_down">সেভ HD</span></button>
            </div>
            <div id="qr-info-bar">
                <span>📊 <span id="info-chars">0</span> chars</span>
                <span>⚡ <span id="info-level">H</span> error</span>
                <span>📐 <span id="info-size">200</span>px</span>
            </div>
        </div>

        <div id="view-text" class="view-section active">
            <div id="detect-badge-wrap"></div>
            <div class="input-wrap">
                <label data-i18n="lbl_text">টেক্সট বা লিংক দিন</label>
                <input type="text" id="inp-text" data-i18n-ph="ph_text" placeholder="https://..." oninput="autoGenerate(); autoDetectType(this.value)">
            </div>
        </div>

        <div id="view-whatsapp" class="view-section">
            <div class="input-wrap">
                <label data-i18n="lbl_wa_ph">হোয়াটসঅ্যাপ নাম্বার</label>
                <input type="tel" id="wa-phone" placeholder="01XXXXXXXXX" oninput="autoGenerate()">
            </div>
            <div class="input-wrap">
                <label data-i18n="lbl_wa_msg">মেসেজ (ঐচ্ছিক)</label>
                <textarea id="wa-msg" data-i18n-ph="ph_wa_msg" placeholder="হ্যালো..." oninput="autoGenerate()"></textarea>
            </div>
        </div>

        <div id="view-wifi" class="view-section">
            <div class="input-wrap">
                <label data-i18n="lbl_wifi_ssid">WiFi এর নাম (SSID)</label>
                <input type="text" id="wifi-ssid" placeholder="My Network" oninput="autoGenerate()">
            </div>
            <div class="input-wrap">
                <label data-i18n="lbl_wifi_pass">পাসওয়ার্ড</label>
                <input type="password" id="wifi-pass" placeholder="••••••••" oninput="autoGenerate()">
            </div>
        </div>

        <div id="view-location" class="view-section">
            <div class="input-wrap">
                <label data-i18n="lbl_loc_lat">ল্যাটিটিউড (Latitude)</label>
                <input type="number" id="loc-lat" placeholder="23.8103" oninput="autoGenerate()">
            </div>
            <div class="input-wrap">
                <label data-i18n="lbl_loc_lon">লঙ্গিটিউড (Longitude)</label>
                <input type="number" id="loc-lon" placeholder="90.4125" oninput="autoGenerate()">
            </div>
        </div>

        <div id="view-contact" class="view-section">
            <div class="input-wrap"><label data-i18n="lbl_vc_name">নাম</label><input type="text" id="vc-name" data-i18n-ph="ph_vc_name" placeholder="আপনার নাম" oninput="autoGenerate()"></div>
            <div class="input-wrap"><label data-i18n="lbl_vc_phone">ফোন নাম্বার</label><input type="tel" id="vc-phone" placeholder="01XXXXXXXXX" oninput="autoGenerate()"></div>
            <div class="input-wrap"><label data-i18n="lbl_vc_email">ইমেইল</label><input type="email" id="vc-email" placeholder="example@mail.com" oninput="autoGenerate()"></div>
        </div>

        <div id="view-email" class="view-section">
            <div class="input-wrap"><label data-i18n="lbl_em_to">ইমেইল অ্যাড্রেস</label><input type="email" id="em-to" placeholder="kake@pathaben.com" oninput="autoGenerate()"></div>
            <div class="input-wrap"><label data-i18n="lbl_em_sub">সাবজেক্ট</label><input type="text" id="em-sub" data-i18n-ph="lbl_em_sub" placeholder="কাজের বিষয়" oninput="autoGenerate()"></div>
            <div class="input-wrap"><label data-i18n="lbl_em_msg">মেসেজ</label><textarea id="em-msg" data-i18n-ph="lbl_em_msg" placeholder="বিস্তারিত লিখুন..." oninput="autoGenerate()"></textarea></div>
        </div>

        <div id="view-sms" class="view-section">
            <div class="input-wrap"><label data-i18n="lbl_sms_phone">ফোন নাম্বার</label><input type="tel" id="sms-phone" placeholder="01XXXXXXXXX" oninput="autoGenerate()"></div>
            <div class="input-wrap"><label data-i18n="lbl_sms_msg">মেসেজ</label><textarea id="sms-msg" data-i18n-ph="lbl_em_msg" placeholder="মেসেজ লিখুন..." oninput="autoGenerate()"></textarea></div>
        </div>

        <div id="view-social" class="view-section">
            <div class="input-wrap">
                <label data-i18n="lbl_soc_plat">প্ল্যাটফর্ম</label>
                <select id="soc-platform" onchange="autoGenerate()">
                    <option value="fb">Facebook</option>
                    <option value="insta">Instagram</option>
                    <option value="yt">YouTube</option>
                </select>
            </div>
            <div class="input-wrap">
                <label data-i18n="lbl_soc_url">ইউজারনেম বা প্রোফাইল লিংক</label>
                <input type="text" id="soc-url" placeholder="username বা link" oninput="autoGenerate()">
            </div>
        </div>

        <div id="view-design" class="view-section">
            <div class="input-wrap"><label data-i18n="lbl_dsg_txt">কাস্টম লেখা (নিচে দেখাবে)</label>
                <input type="text" id="frame-text" placeholder="S C A N  M E" oninput="autoGenerate()">
            </div>
            <div class="input-wrap">
                <label data-i18n="lbl_dsg_logo">মাঝখানে লোগো বসান</label>
                <input type="file" id="inp-logo" accept="image/*" style="padding: 10px;">
            </div>
            <!-- 🌈 Gradient Colors -->
            <div class="input-wrap">
                <label>🌈 QR গ্রাদিয়েন্ট কালার</label>
                <div class="gradient-row">
                    <input type="color" id="col-dark" value="#000000" onchange="autoGenerate()" style="flex:1">
                    <div class="gradient-toggle switch-wrap" style="margin:0;flex-shrink:0;">
                        <input type="checkbox" id="use-gradient" onchange="toggleGradientUI(); autoGenerate()">
                        <span style="font-size:12px;">Gradient</span>
                    </div>
                    <input type="color" id="col-dark2" value="#6366f1" onchange="autoGenerate()" style="flex:1; display:none;">
                </div>
            </div>
            <div class="input-wrap color-grid">
                <div><label data-i18n="lbl_dsg_bg_col">ব্যাকগ্রাউন্ড</label><input type="color" id="col-light" value="#ffffff" onchange="autoGenerate()"></div>
                <div style="display:flex;flex-direction:column;justify-content:flex-end;">
                    <div class="switch-wrap" style="margin-bottom:0;">
                        <input type="checkbox" id="bg-transparent" onchange="autoGenerate()">
                        <span style="font-size:12px;" data-i18n="lbl_dsg_trans">স্বচ্ছ</span>
                    </div>
                </div>
            </div>
            <!-- 📈 QR Size Slider -->
            <div class="input-wrap">
                <label>📈 QR সাইজ: <span class="size-display" id="size-val">200px</span></label>
                <input type="range" id="qr-size" min="120" max="280" value="200" step="10" oninput="updateSize(this.value); autoGenerate()">
            </div>
            <!-- 🔵 Corner Shape -->
            <div class="input-wrap">
                <label>🔵 কোরনার শেপ</label>
                <div class="frame-grid">
                    <div class="frame-chip active" id="corner-square" onclick="setCorner('square', this)">
                        <i class="fa-solid fa-square"></i><span>Square</span>
                    </div>
                    <div class="frame-chip" id="corner-dot" onclick="setCorner('dot', this)">
                        <i class="fa-solid fa-circle"></i><span>Dot</span>
                    </div>
                    <div class="frame-chip" id="corner-extra-rounded" onclick="setCorner('extra-rounded', this)">
                        <i class="fa-regular fa-circle"></i><span>Round</span>
                    </div>
                    <div class="frame-chip" id="corner-diamond" onclick="setCorner('diamond', this)">
                        <i class="fa-solid fa-diamond"></i><span>Classic</span>
                    </div>
                </div>
            </div>
            <!-- 🎨 QR Skin Picker -->
            <div class="input-wrap">
                <label>🎨 QR স্কিন স্টাইল</label>
                <div class="skin-grid">
                    <div class="skin-card active" id="skin-classic" onclick="setSkin('classic',this)">
                        <div class="skin-preview" style="background:#000;">

            title: "QR Studio", lbl_text: "Enter Text or Link", ph_text: "https://...",
            lbl_wa_ph: "WhatsApp Number", lbl_wa_msg: "Message (Optional)", ph_wa_msg: "Hello...",
            lbl_wifi_ssid: "WiFi Name (SSID)", lbl_wifi_pass: "Password",
            lbl_loc_lat: "Latitude", lbl_loc_lon: "Longitude",
            lbl_vc_name: "Name", ph_vc_name: "Your Name", lbl_vc_phone: "Phone Number", lbl_vc_email: "Email",
            lbl_em_to: "Email Address", lbl_em_sub: "Subject", lbl_em_msg: "Write details...",

            lbl_dsg_qr_col: "QR Color", lbl_dsg_bg_col: "Background",
            lbl_dsg_trans: "Transparent Background", lbl_dsg_style: "QR Code Style",
            opt_sq: "Classic (Square)", opt_dot: "Premium (Dot)", hist_title: "Saved History",
            lbl_scan_res: "Scan Result",
            nav_text: "Link", nav_scan: "Scan", nav_wa: "WA", nav_loc: "Location", nav_wifi: "WiFi", nav_contact: "Contact",

            btn_copy: "Copy", btn_share: "Share", btn_down: "Save HD", btn_open: "Open", hist_empty: "No history found.",
            t_copy: "✅ Copied!", t_err: "❌ Requires live server", t_sh_err: "❌ Share not supported",

        }
    };

    let currentLang = localStorage.getItem('lang') || 'bn';

    function applyLanguage() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = dict[currentLang][el.getAttribute('data-i18n')];
        });
        document.querySelectorAll('[data-i18n-ph]').forEach(el => {
            el.placeholder = dict[currentLang][el.getAttribute('data-i18n-ph')];
        });
        document.getElementById('lang-btn').innerText = currentLang === 'bn' ? 'EN' : 'BN';
        if (currentTab === 'history') loadHistory();
    }

    function toggleLang() {
        currentLang = currentLang === 'bn' ? 'en' : 'bn';
        localStorage.setItem('lang', currentLang);
        applyLanguage();
    }
    
    // 🔥 Core App Logic 🔥
    let currentTab = 'text', activeDataTab = 'text', logoData = null, qrGenerated = false, lastGeneratedData = "";
    let html5QrCode = null;
    let currentCorner = 'square'; // Corner shape state
    let currentQrSize = 200;      // Size state

    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('theme-icon').className = 'fa-solid fa-sun';
    }

    applyLanguage();

    // 🔍 AUTO DETECT TYPE
    const detectRules = [
        { test: v => /^https?:\/\//i.test(v),                        tab: 'text',     icon: '🌐', label: 'URL লিংক' },
        { test: v => /^wa\.me|whatsapp/i.test(v),                   tab: 'whatsapp', icon: '💬', label: 'WhatsApp' },
        { test: v => /^WIFI:/i.test(v),                              tab: 'wifi',     icon: '📡', label: 'WiFi' },
        { test: v => /^geo:|^[0-9.]+,\s*[0-9.]+$/.test(v),          tab: 'location', icon: '📍', label: 'Location' },
        { test: v => /^BEGIN:VCARD/i.test(v),                        tab: 'contact',  icon: '📞', label: 'Contact' },
        { test: v => /^mailto:/i.test(v),                            tab: 'email',    icon: '✉️', label: 'Email' },
        { test: v => /^SMSTO:/i.test(v),                             tab: 'sms',      icon: '💬', label: 'SMS' },
        { test: v => /facebook\.com|instagram\.com|youtube\.com/i.test(v), tab: 'social', icon: '🔷', label: 'Social' },
    ];
    function autoDetectType(value) {
        const wrap = document.getElementById('detect-badge-wrap');
        if (!value.trim()) { wrap.innerHTML = ''; return; }
        const match = detectRules.find(r => r.test(value));
        if (match) {
            wrap.innerHTML = `<div class="detect-badge">${match.icon} ${match.label} সনআক্ত হয়েছে!</div>`;
        } else {
            wrap.innerHTML = `<div class="detect-badge">📝 টেক্সট</div>`;
        }
    }

    // 🔍 ZOOM MODAL
    function openZoom() {
        if (!qrGenerated) return;
        const canvas = document.querySelector('#qr-container canvas');
        if (!canvas) return;
        const display = document.getElementById('zoom-qr-display');
        const img = document.createElement('img');
        img.src = canvas.toDataURL('image/png');
        img.style.cssText = 'width:260px;height:260px;border-radius:12px;';
        display.innerHTML = '';
        display.appendChild(img);
        document.getElementById('zoom-modal').classList.add('open');
    }
    function closeZoom() { document.getElementById('zoom-modal').classList.remove('open'); }

    // ⭐ FAVORITES & DELETE - History
    function toggleFav(index) {
        let hist = JSON.parse(localStorage.getItem('qr_history') || '[]');
        hist[index].fav = !hist[index].fav;
        localStorage.setItem('qr_history', JSON.stringify(hist));
        loadHistory();
    }
    function deleteHist(index) {
        let hist = JSON.parse(localStorage.getItem('qr_history') || '[]');
        hist.splice(index, 1);
        localStorage.setItem('qr_history', JSON.stringify(hist));
        loadHistory();
    }

    // 📷 SCAN HISTORY
    function saveScanHistory(text) {
        let sh = JSON.parse(localStorage.getItem('scan_history') || '[]');
        if (sh[0] === text) return;
        sh.unshift(text);
        if (sh.length > 10) sh.pop();
        localStorage.setItem('scan_history', JSON.stringify(sh));
        loadScanHistory();
    }
    function loadScanHistory() {
        const list = document.getElementById('scan-history-list');
        if (!list) return;
        let sh = JSON.parse(localStorage.getItem('scan_history') || '[]');
        if (sh.length === 0) { list.innerHTML = `<p style='color:var(--text-muted);font-size:12px;'>অর্তাৎ কোনো হিস্ট্রি নেই</p>`; return; }
        list.innerHTML = sh.map((t, i) => `
            <div class="scan-hist-item">
                <span class="scan-hist-text">${t}</span>
                <div class="scan-hist-actions">
                    <button onclick="document.getElementById('scan-result').value='${t.replace(/'/g,'&#39;')}'" title="Restore">🔄</button>
                    <button onclick="navigator.clipboard.writeText('${t.replace(/'/g,'&#39;')}')" title="Copy">📋</button>
                    <button onclick="deleteScanHist(${i})" title="Delete">🗑️</button>
                </div>
            </div>`).join('');
    }
    function deleteScanHist(i) {
        let sh = JSON.parse(localStorage.getItem('scan_history') || '[]');
        sh.splice(i, 1);
        localStorage.setItem('scan_history', JSON.stringify(sh));
        loadScanHistory();
    }

    // 🌈 GRADIENT / DESIGN POWER-UPS
    function toggleGradientUI() {
        const c2 = document.getElementById('col-dark2');
        c2.style.display = document.getElementById('use-gradient').checked ? 'flex' : 'none';
    }
    let selectedCorner = 'square';
    function setCorner(type, el) {
        selectedCorner = type;
        document.querySelectorAll('.frame-chip[id^="corner-"]').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        autoGenerate();
    }
    function updateSize(val) {
        currentQrSize = parseInt(val);
        document.getElementById('size-val').textContent = val + 'px';
        document.getElementById('info-size').textContent = val;
        const c = document.getElementById('qr-container');
        c.style.width = val + 'px'; c.style.height = val + 'px';
    }
    function applyTemplate(type, el) {
        document.querySelectorAll('.frame-chip:not([id])').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        const templates = {
            none:  { dark: '#000000', light: '#ffffff', grad: false },
            blue:  { dark: '#1d4ed8', light: '#eff6ff', grad: false },
            dark:  { dark: '#ffffff', light: '#0f172a', grad: false },
            neon:  { dark: '#10b981', light: '#022c22', grad: false },
        };
        const t = templates[type];
        document.getElementById('col-dark').value  = t.dark;
        document.getElementById('col-light').value = t.light;
        document.getElementById('use-gradient').checked = t.grad;
        toggleGradientUI();
        document.getElementById('bg-transparent').checked = false;
        autoGenerate();
    }

    // 🎨 SKIN PICKER
    const skinPresets = {
        classic: { dark:'#000000', light:'#ffffff', dot: 1,   grad: false, dark2: '#000000' },
        dot:     { dark:'#1e293b', light:'#ffffff', dot: 0.5, grad: false, dark2: '#1e293b' },
        blue:    { dark:'#3b82f6', light:'#eff6ff', dot: 0.8, grad: true,  dark2: '#6366f1' },
        neon:    { dark:'#10b981', light:'#022c22', dot: 1,   grad: false, dark2: '#10b981' },
        rose:    { dark:'#f43f5e', light:'#fff1f2', dot: 0.7, grad: true,  dark2: '#f97316' },
        gold:    { dark:'#f59e0b', light:'#1c1400', dot: 1,   grad: false, dark2: '#f59e0b' },
        galaxy:  { dark:'#a78bfa', light:'#0f0c29', dot: 0.5, grad: true,  dark2: '#c4b5fd' },
        mono:    { dark:'#334155', light:'#f8fafc', dot: 1,   grad: false, dark2: '#334155' },
    };
    function setSkin(name, el) {
        document.querySelectorAll('.skin-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        const s = skinPresets[name];
        document.getElementById('col-dark').value  = s.dark;
        document.getElementById('col-light').value = s.light;
        document.getElementById('col-dark2').value = s.dark2;
        document.getElementById('use-gradient').checked = s.grad;
        toggleGradientUI();
        document.getElementById('bg-transparent').checked = false;
        
        if (s.dot < 1) {
            document.getElementById('qr-style').value = 'dot';
        } else {
            document.getElementById('qr-style').value = 'square';
        }

        let cName = 'square';
        if(name === 'dot' || name === 'galaxy') cName = 'dot';
        else if(name === 'rose' || name === 'blue') cName = 'extra-rounded';
        
        document.querySelectorAll('.frame-chip[id^="corner-"]').forEach(c => c.classList.remove('active'));
        const cornerEl = document.getElementById('corner-' + cName);
        if(cornerEl) cornerEl.classList.add('active');
        selectedCorner = cName;
        
        autoGenerate();
    }

    function switchTab(tabName, element) {
        // Stop scanner if leaving scan tab
        if (currentTab === 'scan' && tabName !== 'scan') stopScanner();

        currentTab = tabName;
        if (tabName !== 'design' && tabName !== 'history' && tabName !== 'scan') { activeDataTab = tabName; }
        
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById(`view-${tabName}`).classList.add('active');
        element.classList.add('active');
        element.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

        // Logic for Scanner vs Generator
        const qrCard = document.getElementById('qr-card');
        if (tabName === 'scan') {
            qrCard.style.display = 'none'; // Hide QR Card when scanning
            startScanner();
        } else {
            qrCard.style.display = 'flex'; // Show QR Card
            if (tabName === 'history') loadHistory(); else autoGenerate();
        }
    }

    // --- NEW: Scanner Functions ---
    function startScanner() {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        html5QrCode.start({ facingMode: "environment" }, config,
            (decodedText) => {
                document.getElementById('scan-result').value = decodedText;
                saveScanHistory(decodedText); // 📷 Save to scan history
                showToast('t_scan_succ');
                stopScanner();
            },
            () => {}
        ).catch(err => console.log("Camera access error:", err));
        loadScanHistory();
    }

    function stopScanner() {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().catch(err => console.log(err));
        }
    }

    function copyScanResult() {
        const text = document.getElementById('scan-result').value;
        if (!text) return showToast('t_err_emp');
        navigator.clipboard.writeText(text); showToast('t_copy');
    }

    function openScanResult() {
        const text = document.getElementById('scan-result').value;
        if (!text) return showToast('t_err_emp');
        if (text.startsWith("http://") || text.startsWith("https://")) {
            window.open(text, '_blank');
        } else { showToast('t_open_err'); }
    }
    // ------------------------------

    document.getElementById('inp-logo').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(evt) { logoData = evt.target.result; autoGenerate(); };
            reader.readAsDataURL(file);
        } else { logoData = null; autoGenerate(); }
    });

    let typingTimer;
    function autoGenerate() { clearTimeout(typingTimer); typingTimer = setTimeout(generateQR, 300); }

    function generateQR() {
        if (currentTab === 'scan') return;
        let textData = "";
        const sizeEl = document.getElementById('qr-size');
        const qrSize = sizeEl ? parseInt(sizeEl.value) : 200;

        if (activeDataTab === 'text') textData = document.getElementById('inp-text').value;
        else if (activeDataTab === 'whatsapp') {
            let phone = document.getElementById('wa-phone').value.trim().replace(/[^0-9]/g, ""); 
            if (phone.startsWith("01") && phone.length === 11) phone = "88" + phone;
            const msg = encodeURIComponent(document.getElementById('wa-msg').value);
            if(phone) textData = `https://wa.me/${phone}?text=${msg}`;
        } 
        else if (activeDataTab === 'wifi') {
            const ssid = document.getElementById('wifi-ssid').value;
            const pass = document.getElementById('wifi-pass').value;
            if(ssid) textData = `WIFI:S:${ssid};T:WPA;P:${pass};;`;
        }
        else if (activeDataTab === 'location') {
            const lat = document.getElementById('loc-lat').value;
            const lon = document.getElementById('loc-lon').value;
            if(lat && lon) textData = `geo:${lat},${lon}`;
        }
        else if (activeDataTab === 'contact') {
            const n = document.getElementById('vc-name').value, p = document.getElementById('vc-phone').value, e = document.getElementById('vc-email').value;
            if(n||p||e) textData = `BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL;TYPE=CELL:${p}\nEMAIL:${e}\nEND:VCARD`;
        }
        else if (activeDataTab === 'email') {
            const to = document.getElementById('em-to').value, sub = encodeURIComponent(document.getElementById('em-sub').value), msg = encodeURIComponent(document.getElementById('em-msg').value);
            if(to) textData = `mailto:${to}?subject=${sub}&body=${msg}`;
        }
        else if (activeDataTab === 'sms') {
            const ph = document.getElementById('sms-phone').value, msg = document.getElementById('sms-msg').value;
            if(ph) textData = `SMSTO:${ph}:${msg}`;
        }
        else if (activeDataTab === 'social') {
            const pf = document.getElementById('soc-platform').value, url = document.getElementById('soc-url').value.trim();
            if(url) {
                if(url.startsWith('http')) textData = url;
                else {
                    if(pf==='fb') textData = `https://facebook.com/${url}`;
                    if(pf==='insta') textData = `https://instagram.com/${url}`;
                    if(pf==='yt') textData = `https://youtube.com/@${url}`;
                }
            }
        }
        // 📞 Phone Call
        else if (activeDataTab === 'phone') {
            const num = document.getElementById('phone-num').value.trim().replace(/[^0-9+]/g,'');
            if(num) textData = `TEL:${num}`;
        }
        // 💸 Payment (bKash/Nagad)
        else if (activeDataTab === 'payment') {
            const svc   = document.getElementById('pay-service').value;
            const num   = document.getElementById('pay-number').value.trim();
            const amt   = document.getElementById('pay-amount').value.trim();
            if(num) {
                if(svc === 'bkash') {
                    textData = `bkash://sendmoney?receiver=${num}` + (amt ? `&amount=${amt}` : '');
                } else if(svc === 'nagad') {
                    textData = `nagad://sendmoney?receiver=${num}` + (amt ? `&amount=${amt}` : '');
                } else if(svc === 'rocket') {
                    textData = `rocket://sendmoney?receiver=${num}` + (amt ? `&amount=${amt}` : '');
                } else if(svc === 'upay') {
                    textData = `upay://sendmoney?receiver=${num}` + (amt ? `&amount=${amt}` : '');
                }
            }
        }
        // 💬 Telegram
        else if (activeDataTab === 'telegram') {
            const uname = document.getElementById('tg-username').value.trim();
            if(uname) {
                if(uname.startsWith('http')) textData = uname;
                else textData = `https://t.me/${uname.replace(/^@/,'')}`;
            }
        }
        // 📅 Event / Calendar (iCal VEVENT)
        else if (activeDataTab === 'event') {
            const title = document.getElementById('ev-title').value.trim();
            const start = document.getElementById('ev-start').value;
            const end   = document.getElementById('ev-end').value;
            const loc   = document.getElementById('ev-location').value.trim();
            const desc  = document.getElementById('ev-desc').value.trim();
            if(title && start) {
                const toIcal = d => d.replace(/[-:T]/g,'').slice(0,15)+'Z';
                textData = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${title}\nDTSTART:${toIcal(start)}\nDTEND:${toIcal(end||start)}\n${loc?'LOCATION:'+loc+'\n':''}${desc?'DESCRIPTION:'+desc+'\n':''}END:VEVENT\nEND:VCALENDAR`;
            }
        }

        const container = document.getElementById('qr-container');
        const actionBtns = document.getElementById('action-btns');
        const infoBar = document.getElementById('qr-info-bar');
        const isTransparent = document.getElementById('bg-transparent').checked;
        const useGrad = document.getElementById('use-gradient') && document.getElementById('use-gradient').checked;

        if (!textData.trim()) {
            container.innerHTML = '<i class="fa-solid fa-qrcode" style="font-size: 70px; color: #cbd5e1;"></i>';
            container.style.background = isTransparent ? 'transparent' : 'white';
            actionBtns.style.display = 'none';
            if (infoBar) infoBar.classList.remove('visible');
            qrGenerated = false; return;
        }

        lastGeneratedData = textData;
        container.innerHTML = "";
        const isDot = document.getElementById('qr-style').value === 'dot';

        // 🌈 Gradient color logic
        let darkColor = document.getElementById('col-dark').value;
        let lightColor = isTransparent ? "rgba(255,255,255,0)" : document.getElementById('col-light').value;
        const gradientColor = (useGrad && document.getElementById('col-dark2'))
            ? { type: 'linear', position0: 0, position1: 1, color0: darkColor, color1: document.getElementById('col-dark2').value }
            : undefined;

        // 🔵 Corner shape => dotScale mapping
        const cornerDotScale = selectedCorner === 'dot' ? 0.5 : selectedCorner === 'extra-rounded' ? 0.7 : 1;
        const finalDotScale = isDot ? 0.4 : cornerDotScale;

        new QRCode(container, {
            text: textData, width: qrSize, height: qrSize,
            colorDark: darkColor,
            colorLight: lightColor,
            correctLevel: QRCode.CorrectLevel.H,
            dotScale: finalDotScale,
            logo: logoData, logoWidth: 55, logoHeight: 55, logoBackgroundTransparent: false,
            ...(gradientColor ? { colorDark: gradientColor } : {})
        });

        container.style.background = isTransparent
            ? 'url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAYAAACNMs+9AAAAHElEQVQYV2NkYGAwYkAD////Mw7y4igwDhoAxgMAgZkEAfxM2iUAAAAASUVORK5CYII=) repeat'
            : 'white';
        actionBtns.style.display = 'flex';
        qrGenerated = true;

        // ✨ Pop animation
        container.classList.remove('qr-animate');
        void container.offsetWidth;
        container.classList.add('qr-animate');

        // 📊 QR Info Bar update
        if (infoBar) {
            document.getElementById('info-chars').textContent = textData.length;
            document.getElementById('info-size').textContent = qrSize;
            infoBar.classList.add('visible');
        }
    }

    function showToast(msgKey) {
        const toast = document.getElementById("toast");
        toast.innerText = dict[currentLang][msgKey]; 
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function saveToHistory() {
        if (!qrGenerated || !lastGeneratedData) return;
        let hist = JSON.parse(localStorage.getItem('qr_history') || '[]');
        if (hist.length > 0 && hist[0].data === lastGeneratedData) return; 
        hist.unshift({ type: activeDataTab, data: lastGeneratedData });
        if(hist.length > 15) hist.pop(); 
        localStorage.setItem('qr_history', JSON.stringify(hist));
    }

    function loadHistory() {
        const list = document.getElementById('history-list');
        let hist = JSON.parse(localStorage.getItem('qr_history') || '[]');
        if (hist.length === 0) {
            list.innerHTML = `<p style='color:var(--text-muted); font-size:13px;'>${dict[currentLang]['hist_empty']}</p>`;
            return;
        }
        list.innerHTML = "";
        const favs = hist.filter(h => h.fav);
        const others = hist.filter(h => !h.fav);
        if (favs.length > 0) {
            list.innerHTML += `<div class="fav-section-title">⭐ Favorites</div>`;
            favs.forEach((h, i) => renderHistItem(list, h, hist.indexOf(h)));
        }
        if (others.length > 0) {
            list.innerHTML += `<div class="all-section-title">📋 সব হিস্ট্রি</div>`;
            others.forEach((h, i) => renderHistItem(list, h, hist.indexOf(h)));
        }
    }
    function renderHistItem(list, h, index) {
        let div = document.createElement('div');
        div.className = 'history-item' + (h.fav ? ' is-fav' : '');
        div.innerHTML = `
            <span class="history-text" onclick="restoreFromHistory('${h.data.replace(/'/g,"&#39;")}')">${h.data}</span>
            <div class="hist-actions">
                <button class="fav-btn" onclick="toggleFav(${index})" title="Favorite">${h.fav ? '⭐' : '☆'}</button>
                <button class="del-btn" onclick="deleteHist(${index})" title="Delete">🗑️</button>
                <span class="history-type">${h.type.toUpperCase()}</span>
            </div>`;
        list.appendChild(div);
    }

    function restoreFromHistory(data) {
        switchTab('text', document.querySelector('.bottom-nav button:nth-child(1)'));
        document.getElementById('inp-text').value = data;
        autoGenerate(); showToast('t_res');
    }

    async function copyQR() {
        const canvas = document.querySelector('#qr-container canvas');
        if (!canvas) return;
        saveToHistory();
        try {
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
            showToast('t_copy');
        } catch (error) { showToast('t_err'); }
    }

    async function shareQR() {
        const canvas = document.querySelector('#qr-container canvas');
        if (!canvas) return;
        saveToHistory();
        try {
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            const file = new File([blob], 'QR-Code.png', { type: 'image/png' });
            if (navigator.share) await navigator.share({ files: [file], title: 'My QR Code' });
            else showToast('t_sh_err');
        } catch (error) {}
    }

    function downloadQR() {
        if (!qrGenerated) return showToast('t_err_emp');
        saveToHistory();
        const originalCanvas = document.querySelector('#qr-container canvas');
        if (!originalCanvas) return;

        const exportCanvas = document.createElement('canvas');
        const ctx = exportCanvas.getContext('2d');
        const isTransparent = document.getElementById('bg-transparent').checked;
        const scale = 4, qrSize = originalCanvas.width * scale, padding = 60 * scale; 
        const bottomSpace = isTransparent ? padding : 130 * scale; 

        exportCanvas.width = qrSize + (padding * 2); exportCanvas.height = qrSize + padding + bottomSpace;

        if (!isTransparent) {
            ctx.fillStyle = document.getElementById('col-light').value;
            ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
        }

        ctx.imageSmoothingEnabled = false; 
        ctx.drawImage(originalCanvas, padding, padding, qrSize, qrSize);

        if (!isTransparent) {
            let customText = document.getElementById('frame-text').value.trim();
            if(!customText) customText = "S C A N  M E";
            ctx.fillStyle = document.getElementById('col-dark').value; 
            ctx.font = `bold ${30 * scale}px 'Helvetica Neue', sans-serif`;
            ctx.textAlign = 'center';
            const textX = exportCanvas.width / 2, textY = exportCanvas.height - bottomSpace + (50 * scale);
            ctx.fillText(customText, textX, textY);
            ctx.fillStyle = '#64748b'; 
            ctx.font = `500 ${16 * scale}px 'Helvetica Neue', sans-serif`;
            
            // 🔥 Watermark Added Here 🔥
            ctx.fillText("Generated by QR Studio", textX, textY + (40 * scale));
        }

        const link = document.createElement('a');
        link.download = `QR-Studio-${Date.now()}.png`; link.href = exportCanvas.toDataURL("image/png", 1.0); link.click();
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.4 }, zIndex: 9999 }); showToast('t_down');
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        document.getElementById('theme-icon').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // 🔥 100% Offline Support 🔥
    if ('serviceWorker' in navigator) {
        const swCode = `
            const CACHE = 'qr-studio-v3';
            const assets = [
                location.href,
                'https://cdn.jsdelivr.net/npm/easyqrcodejs@4.4.13/dist/easy.qrcode.min.js',
                'https://unpkg.com/html5-qrcode',
                'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css',
                'https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js'
            ];
            self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE).then(c => c.addAll(assets))); });
            self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(res => res || fetch(e.request))); });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        try { navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{}); } catch(e){}
    }
</script>
