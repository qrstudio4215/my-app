<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জন্ম নিবন্ধন যাচাই সিস্টেম</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            color: #1a365d;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        }

        button {
            width: 100%;
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2b6cb0;
        }

        button:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }

        #loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #3182ce;
            font-weight: 600;
        }

        #result-box {
            display: none;
            margin-top: 25px;
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            padding: 15px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #bee3f8;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            color: #2c5282;
            width: 40%;
        }

        .result-value {
            color: #2d3748;
            width: 60%;
            text-align: right;
            font-weight: 600;
        }

        .error-msg {
            color: #e53e3e;
            background-color: #fff5f5;
            border: 1px solid #feb2b2;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>জন্ম নিবন্ধন যাচাই</h2>
        
        <div class="input-group">
            <label for="brn">নিবন্ধন নম্বর (BRN)</label>
            <input type="number" id="brn" placeholder="১৭ ডিজিটের নিবন্ধন নম্বর দিন">
        </div>
        
        <div class="input-group">
            <label for="dob">জন্ম তারিখ (DOB)</label>
            <input type="date" id="dob">
        </div>
        
        <button id="searchBtn" onclick="fetchData()">যাচাই করুন</button>

        <div id="loader">ডেটা খোঁজা হচ্ছে, দয়া করে অপেক্ষা করুন...</div>
        
        <div id="error-box" class="error-msg"></div>

        <div id="result-box"></div>
    </div>

    <script>
        async function fetchData() {
            const brn = document.getElementById('brn').value;
            const dob = document.getElementById('dob').value;
            
            const btn = document.getElementById('searchBtn');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('result-box');
            const errorBox = document.getElementById('error-box');

            if (!brn || !dob) {
                showError("অনুগ্রহ করে নিবন্ধন নম্বর এবং জন্ম তারিখ দিন!");
                return;
            }

            resultBox.style.display = 'none';
            errorBox.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;

            // CORS সমাধান: এখানে allorigins proxy ব্যবহার করা হয়েছে
            const targetUrl = encodeURIComponent(`https://infodokan.myani.top/apilab/BIRTH-INFO-MAIN.php?brn=${brn}&dob=${dob}`);
            const proxyUrl = `https://api.allorigins.win/raw?url=${targetUrl}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();

                loader.style.display = 'none';
                btn.disabled = false;

                // যদি API থেকে এরর আসে
                if(data.error || Object.keys(data).length === 0) {
                    showError("কোনো তথ্য পাওয়া যায়নি। নম্বর ও তারিখ ঠিক আছে কিনা চেক করুন।");
                    return;
                }

                let htmlData = '<h3 style="color:#2b6cb0; text-align:center; margin-bottom:15px;">প্রাপ্ত তথ্য</h3>';
                
                for (const [key, value] of Object.entries(data)) {
                    htmlData += `
                        <div class="result-item">
                            <span class="result-label">${key}</span>
                            <span class="result-value">${value}</span>
                        </div>
                    `;
                }

                resultBox.innerHTML = htmlData;
                resultBox.style.display = 'block';

            } catch (error) {
                loader.style.display = 'none';
                btn.disabled = false;
                showError("সার্ভার ডাউন আছে অথবা ডেটা লোড হতে ব্যর্থ হয়েছে!");
                console.error("Error:", error);
            }
        }

        function showError(msg) {
            const errorBox = document.getElementById('error-box');
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
        }
    </script>

</body>
</html>
